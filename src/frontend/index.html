<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>RAG Compare POC</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="nav">
    <span class="logo">⚡ RAG Compare POC</span>
    <a href="/chat">채팅</a>
    <a href="/compare">RAG 비교</a>
  </nav>

  <div class="hero">
    <h1>Basic RAG vs <span>RAPTOR RAG</span></h1>
    <p>대화 데이터를 수집하고, 두 가지 RAG 방식의 검색 품질을 나란히 비교합니다.</p>
    <div class="btn-row">
      <a href="/chat" class="btn btn-primary">💬 채팅 시작</a>
      <a href="/compare" class="btn btn-outline">📊 RAG 비교</a>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h3>💬 대화 수집</h3>
      <p>2인 대화 또는 그룹 채팅을 직접 입력하거나 AI 에이전트가 자동 생성합니다.</p>
    </div>
    <div class="card">
      <h3>🔵 Basic RAG</h3>
      <p>고정 크기 청킹 + cosine similarity 검색. 단순하지만 빠른 기준 성능입니다.</p>
    </div>
    <div class="card">
      <h3>🟣 RAPTOR RAG</h3>
      <p>재귀적 요약 트리 구조로 세부 사실과 전체 맥락을 동시에 검색합니다.</p>
    </div>
  </div>
